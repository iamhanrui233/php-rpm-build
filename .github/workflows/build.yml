name: Build PHP RPM

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: centos:7

    steps:
    - name: Fix CentOS 7 repos (EOL)
      run: |
        sed -i 's|^mirrorlist=|#mirrorlist=|g' /etc/yum.repos.d/CentOS-*.repo
        sed -i 's|^#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' /etc/yum.repos.d/CentOS-*.repo

    - name: Install dependencies
      run: |
        yum install -y epel-release
        yum install -y git make gcc gcc-c++ autoconf libtool bison re2c automake \
          libxml2-devel openssl-devel sqlite-devel libcurl-devel libzip-devel \
          oniguruma-devel readline-devel rpm-build tar gzip

    - name: Checkout PHP source
      uses: actions/checkout@v4
      with:
        repository: php/php-src
        ref: php-7.4.30
        fetch-depth: 1
        path: php-src

    - name: Build PHP
      run: |
        cd php-src
        ./buildconf --force
        ./configure --prefix=/opt/php74 --with-openssl --enable-mbstring --with-curl --with-zlib
        make -j $(nproc)

    - name: Build RPM package
      run: |
        mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
        
        # Create tarball from php-src directory
        cd $GITHUB_WORKSPACE
        mv php-src php-7.4.30
        tar czf ~/rpmbuild/SOURCES/php-7.4.30.tar.gz php-7.4.30
        
        # Create spec file
        cat > ~/rpmbuild/SPECS/php.spec << 'EOF'
        Name: php74-custom
        Version: 7.4.30
        Release: 1%{?dist}
        Summary: PHP scripting language
        License: PHP
        Source0: %{name}-%{version}.tar.gz
        
        %description
        PHP is a popular general-purpose scripting language.
        
        %prep
        %setup -q -n php-%{version}
        
        %build
        ./configure --prefix=/opt/php74 --with-openssl --enable-mbstring --with-curl --with-zlib
        make -j $(nproc)
        
        %install
        rm -rf %{buildroot}
        make install DESTDIR=%{buildroot}
        
        %files
        %defattr(-,root,root,-)
        /opt/php74
        EOF
        
        rpmbuild -bb ~/rpmbuild/SPECS/php.spec

    - name: Prepare artifacts
      run: |
        mkdir -p artifacts
        cp ~/rpmbuild/RPMS/x86_64/*.rpm artifacts/ || cp ~/rpmbuild/RPMS/*/*.rpm artifacts/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: php-7.4.30-centos7-rpm
        path: artifacts/*.rpm
