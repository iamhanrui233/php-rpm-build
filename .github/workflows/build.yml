name: Build PHP RPM for CentOS 7

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Build PHP in CentOS 7 container
      run: |
        docker run --rm -v $PWD:/output centos:7 bash -c '
        set -e
        
        # Fix CentOS 7 repos (EOL)
        sed -i "s|^mirrorlist=|#mirrorlist=|g" /etc/yum.repos.d/CentOS-*.repo
        sed -i "s|^#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g" /etc/yum.repos.d/CentOS-*.repo
        
        # Install dependencies
        yum install -y epel-release
        yum install -y git make gcc gcc-c++ autoconf libtool bison re2c automake \
          libxml2-devel openssl-devel sqlite-devel libcurl-devel libzip-devel \
          oniguruma-devel readline-devel rpm-build tar gzip wget
        
        # Download PHP source
        cd /tmp
        wget https://www.php.net/distributions/php-7.4.30.tar.gz
        tar xzf php-7.4.30.tar.gz
        cd php-7.4.30
        
        # Build PHP
        ./buildconf --force
        ./configure --prefix=/opt/php74 --with-openssl --enable-mbstring --with-curl --with-zlib
        make -j $(nproc)
        
        # Build RPM
        mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
        
        cd /tmp
        tar czf ~/rpmbuild/SOURCES/php-7.4.30.tar.gz php-7.4.30
        
        cat > ~/rpmbuild/SPECS/php.spec << '\''EOF'\''
        Name: php74-custom
        Version: 7.4.30
        Release: 1.el7
        Summary: PHP scripting language
        License: PHP
        Source0: php-%{version}.tar.gz
        BuildRoot: %{_tmppath}/%{name}-%{version}-%{release}-root
        
        %description
        PHP is a popular general-purpose scripting language.
        
        %prep
        %setup -q -n php-%{version}
        
        %build
        ./configure --prefix=/opt/php74 --with-openssl --enable-mbstring --with-curl --with-zlib
        make -j $(nproc)
        
        %install
        rm -rf %{buildroot}
        mkdir -p %{buildroot}/opt
        make install INSTALL_ROOT=%{buildroot}
        find %{buildroot} -type d -exec chmod 755 {} \;
        
        %files
        %defattr(-,root,root,-)
        /opt/php74
        
        %clean
        rm -rf %{buildroot}
        EOF
        
        rpmbuild -bb ~/rpmbuild/SPECS/php.spec
        
        # Copy RPMs to output
        cp ~/rpmbuild/RPMS/x86_64/*.rpm /output/ || cp ~/rpmbuild/RPMS/*/*.rpm /output/
        '

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: php-7.4.30-centos7-rpm
        path: "*.rpm"
